<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GigDashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Pixel shift — 2px drift over 10 minutes to prevent screen burn */
    @keyframes pixel-shift {
      0%   { transform: translate(0px, 0px); }
      25%  { transform: translate(2px, 0px); }
      50%  { transform: translate(2px, 2px); }
      75%  { transform: translate(0px, 2px); }
      100% { transform: translate(0px, 0px); }
    }
    html { animation: pixel-shift 600s infinite linear; }

    :root {
      --bg:          #080d14;
      --surface:     #0f1724;
      --surface2:    #1a2233;
      --border:      #1e2d45;
      --text:        #e8f0fe;
      --muted:       #5a7099;
      --green:       #22c55e;
      --green-dim:   #0d2b1a;
      --gold:        #f59e0b;
      --gold-dim:    #2d1f06;
      --kid1:        #3b82f6;
      --kid1-glow:   #1d4ed8;
      --kid1-dim:    #0c1e3d;
      --kid2:        #ec4899;
      --kid2-glow:   #be185d;
      --kid2-dim:    #3b0e24;
      --lock:        #374151;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -0.02em;
    }

    #date-el {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 500;
    }

    #parent-url {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
      text-align: center;
    }

    #clock-el {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      text-align: right;
    }

    /* ── TRACKING SECTION ───────────────────────────────────── */
    #tracking-bar {
      flex-shrink: 0;
      padding: 6px 20px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      display: none;
      align-items: stretch;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tr-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 14px;
      flex: 1;
    }

    .tr-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      min-width: 100px;
      flex-shrink: 0;
    }

    .tr-steps { display: flex; gap: 8px; }

    .tr-step-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 5px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      min-width: 110px;
    }

    .tr-step-block.done {
      border-color: var(--green);
      background: var(--green-dim);
    }

    .tr-step-lbl {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .tr-step-who {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--muted);
    }

    .tr-step-block.done .tr-step-lbl { color: var(--green); opacity: 0.8; }
    .tr-step-block.done .tr-step-who { color: var(--green); }

    /* ── COLUMNS ────────────────────────────────────────────── */
    #columns {
      display: grid;
      flex: 1;
      min-height: 0;
    }

    .kid-col {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      border-top: 4px solid transparent;
      border-right: 1px solid var(--border);
    }
    .kid-col:last-child { border-right: none; }

    /* ── KID HEADER ─────────────────────────────────────────── */
    .kid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .kid-name {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    /* kid-name color set via inline style from DB */

    .piggy-bank {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-dim);
      border: 1px solid var(--gold);
      border-radius: 10px;
      padding: 5px 12px;
    }

    .piggy-icon { font-size: 1.5rem; }

    .piggy-amount {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
    }

    /* ── SECTIONS ───────────────────────────────────────────── */
    .section { display: flex; flex-direction: column; gap: 4px; overflow: hidden; flex-shrink: 0; }
    .section.gig-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .badge.unlocked {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green);
    }

    .badge.locked {
      background: #111;
      color: var(--lock);
      border: 1px solid var(--lock);
    }

    /* progress bar */
    .progress-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 3px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    /* progress-fill color set via inline style from DB */

    /* ── TASK ITEMS ─────────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
    .gig-section .task-list { flex: 1; overflow-y: auto; gap: 3px; }
    .gig-section .task-list::-webkit-scrollbar { width: 4px; }
    .gig-section .task-list::-webkit-scrollbar-track { background: transparent; }
    .gig-section .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: 500;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .task-item.done {
      border-color: var(--green);
      background: var(--green-dim);
    }

    .task-item.done .task-label {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-item.gig-done {
      opacity: 0.55;
      border-color: var(--green);
    }

    .check-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 900;
    }

    .task-item.done .check-circle,
    .task-item.gig-done .check-circle {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .gig-value {
      margin-left: auto;
      font-weight: 800;
      color: var(--gold);
      font-size: 1.05rem;
      flex-shrink: 0;
    }

    .task-item.gig-done .gig-value { color: var(--muted); }

    /* locked gig panel */
    .locked-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
    }

    .lock-emoji { font-size: 3rem; }
    .lock-text  { font-size: 1rem; font-weight: 600; }
    .lock-sub   { font-size: 0.85rem; color: var(--lock); }

    /* ── REFRESH INDICATOR ──────────────────────────────────── */
    #refresh-dot {
      position: fixed;
      bottom: 16px;
      right: 20px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
      transition: background 0.2s, opacity 0.2s;
    }
    #refresh-dot.active { background: var(--green); opacity: 1; }
  </style>
</head>
<body>
  <div id="header">
    <div class="logo">💰 GigDashboard</div>
    <div style="text-align:center">
      <div id="date-el"></div>
      <div id="parent-url"></div>
    </div>
    <div id="clock-el"></div>
  </div>
  <div id="tracking-bar"></div>
  <div id="columns"></div>
  <div id="refresh-dot"></div>

  <script>
    // ── Clock ────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('clock-el').textContent =
        now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
      document.getElementById('date-el').textContent =
        now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Render ───────────────────────────────────────────────
    function fmt(n) {
      return '$' + parseFloat(n).toFixed(2);
    }

    function renderKid(kid, allKids, idx) {
      const cls   = `kid-${idx + 1}`;
      const color = kid.color || '#3b82f6';
      const done     = kid.dailyTasks.filter(t => t.completed).length;
      const total    = kid.dailyTasks.length;
      const pct      = total ? Math.round((done / total) * 100) : 0;
      const unlocked = kid.allDailyDone;

      const dailyItems = [...kid.dailyTasks].sort((a, b) => b.completed - a.completed).map(t => `
        <div class="task-item ${t.completed ? 'done' : ''}">
          <div class="check-circle">${t.completed ? '✓' : ''}</div>
          <span class="task-label">${t.title}</span>
          ${t.is_trusted && !t.completed ? '<span style="font-size:0.75rem;color:var(--muted);margin-left:auto">✋ tablet</span>' : ''}
        </div>
      `).join('');

      // Filter out tasks claimed by a sibling or handled by a parent, completed float to top
      const myGigs = kid.gigTasks
        .filter(t => (!t.taken_by_kid_id && !t.parent_claimed) || t.completed_by_me)
        .sort((a, b) => b.completed_by_me - a.completed_by_me);

      const gigItems = myGigs.length === 0
        ? '<div class="task-item"><span class="task-label" style="color:var(--muted)">No gig tasks available</span></div>'
        : myGigs.map(t => `
          <div class="task-item ${t.completed_by_me ? 'gig-done' : ''}">
            <div class="check-circle">${t.completed_by_me ? '✓' : ''}</div>
            <span class="task-label">${t.title}</span>
            <span class="gig-value">${fmt(t.value)}</span>
          </div>
        `).join('');

      const gigSection = unlocked ? `
        <div class="section gig-section">
          <div class="section-header">
            <span class="section-title">Gig Tasks</span>
            <span class="badge unlocked">🔓 Unlocked</span>
          </div>
          <div class="task-list">${gigItems}</div>
        </div>
      ` : `
        <div class="section gig-section">
          <div class="section-header">
            <span class="section-title">Gig Tasks</span>
            <span class="badge locked">Locked</span>
          </div>
          <div class="locked-panel">
            <div class="lock-emoji">🔒</div>
            <div class="lock-text">Finish daily tasks to unlock</div>
            <div class="lock-sub">${done} of ${total} complete</div>
          </div>
        </div>
      `;

      return `
        <div class="kid-col ${cls}" style="border-top-color:${color}">
          <div class="kid-header">
            <div class="kid-name" style="color:${color}">${kid.name}</div>
            <div class="piggy-bank">
              <span class="piggy-icon">🐷</span>
              <span class="piggy-amount">${fmt(kid.totalEarnings)}</span>
            </div>
          </div>

          <div class="section">
            <div class="section-header">
              <span class="section-title">Daily Expectations</span>
              <span style="font-size:0.8rem;color:var(--muted)">${done}/${total}</span>
            </div>
            <div class="progress-wrap">
              <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
            </div>
            <div class="task-list">${dailyItems}</div>
          </div>

          ${gigSection}
        </div>
      `;
    }

    function renderTrackingBar(data) {
      const bar = document.getElementById('tracking-bar');
      if (!data.trackingTasks || data.trackingTasks.length === 0) {
        bar.style.display = 'none'; return;
      }
      const kidMap = {};
      data.kids.forEach(k => { kidMap[k.id] = k.name; });

      function stepBlock(label, done, kidId) {
        const who = done
          ? ((kidId === null || kidId === undefined) ? 'Parents' : (kidMap[kidId] || 'Someone'))
          : 'Not done';
        return `
          <div class="tr-step-block ${done ? 'done' : ''}">
            <span class="tr-step-lbl">${label}</span>
            <span class="tr-step-who">${who}${done ? ' ✓' : ''}</span>
          </div>`;
      }

      bar.style.display = 'flex';
      bar.innerHTML = data.trackingTasks.map(t => `
        <div class="tr-item">
          <span class="tr-title">${t.title}</span>
          <div class="tr-steps">
            ${stepBlock(t.step1_label, t.step1_done, t.step1_kid_id)}
            ${stepBlock(t.step2_label, t.step2_done, t.step2_kid_id)}
          </div>
        </div>
      `).join('');
    }

    function render(data) {
      renderTrackingBar(data);
      if (data.parentUrl) {
        document.getElementById('parent-url').textContent = `Parent Panel → ${data.parentUrl}`;
      }
      const cols = document.getElementById('columns');
      cols.style.gridTemplateColumns = `repeat(${data.kids.length}, 1fr)`;
      cols.innerHTML = data.kids.map((kid, idx) => renderKid(kid, data.kids, idx)).join('');
    }

    // ── Fetch & poll ─────────────────────────────────────────
    const dot = document.getElementById('refresh-dot');

    async function fetchData() {
      try {
        const res  = await fetch('/api/dashboard');
        const data = await res.json();
        render(data);
        dot.classList.add('active');
        setTimeout(() => dot.classList.remove('active'), 600);
      } catch (e) {
        console.error('Dashboard fetch failed', e);
      }
    }

    // Push signal — triggers immediate data refresh
    let lastKnownPush = 0, pushReady = false;
    async function checkPush() {
      try {
        const { ts } = await fetch('/api/push').then(r => r.json());
        if (!pushReady) { lastKnownPush = ts; pushReady = true; return; }
        if (ts > lastKnownPush) { lastKnownPush = ts; fetchData(); }
      } catch {}
    }

    // Reload signal — triggers full page reload
    let lastKnownReload = 0, reloadReady = false;
    async function checkReload() {
      try {
        const { ts } = await fetch('/api/admin/tv-reload').then(r => r.json());
        if (!reloadReady) { lastKnownReload = ts; reloadReady = true; return; }
        if (ts > lastKnownReload) { location.reload(); }
      } catch {}
    }

    fetchData();
    setInterval(fetchData,   30000); // background refresh every 30 s
    setInterval(checkPush,    3000); // push signal check every 3 s
    setInterval(checkReload,  3000); // reload signal check every 3 s
  </script>
</body>
</html>
