<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GigDashboard — Parent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f4f8;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1a202c;
      --muted:   #718096;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --green:   #22c55e;
      --green-bg:#f0fdf4;
      --red:     #ef4444;
      --red-bg:  #fff5f5;
      --gold:    #f59e0b;
      --gold-bg: #fffbeb;
      --kid1:    #3b82f6;
      --kid2:    #ec4899;
      --radius:  12px;
      --shadow:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    /* ── SHARED ─────────────────────────────────────────────── */
    .hidden { display: none !important; }

    button {
      cursor: pointer;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      border-radius: 8px;
      transition: background 0.15s, opacity 0.15s;
    }
    button:active { opacity: 0.8; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      padding: 13px 20px;
      font-weight: 600;
      width: 100%;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .btn-sm {
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .btn-green  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
    .btn-red    { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red);  }
    .btn-gold   { background: var(--gold-bg);  color: var(--gold);  border: 1px solid var(--gold); }
    .btn-gray   { background: var(--border);   color: var(--muted);  }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--primary); }

    .error-msg {
      color: var(--red);
      font-size: 0.88rem;
      margin-top: 4px;
      min-height: 20px;
    }

    /* ── LOGIN VIEW ─────────────────────────────────────────── */
    #login-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,.1);
    }

    .login-logo {
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .login-sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-label { font-size: 0.88rem; font-weight: 600; color: var(--muted); }

    /* ── APP VIEW ───────────────────────────────────────────── */
    #app-view { display: none; flex-direction: column; min-height: 100dvh; }

    /* header */
    #app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #app-header .logo { font-size: 1.2rem; font-weight: 800; color: var(--gold); }
    #app-header .user { font-size: 0.85rem; color: var(--muted); }

    #logout-btn {
      background: var(--border);
      color: var(--muted);
      padding: 7px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      border-radius: 8px;
    }

    /* tabs */
    #tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 1;
      padding: 14px 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border-radius: 0;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      min-width: 100px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* content area */
    #tab-content { flex: 1; padding: 20px 16px; max-width: 680px; margin: 0 auto; width: 100%; }

    /* ── KID FILTER ─────────────────────────────────────────── */
    .kid-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .kid-chip {
      flex: 1;
      padding: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      text-align: center;
      transition: all 0.15s;
    }
    .kid-chip.active-kid-1 { border-color: var(--kid1); background: #eff6ff; color: var(--kid1); }
    .kid-chip.active-kid-2 { border-color: var(--kid2); background: #fdf2f8; color: var(--kid2); }

    /* ── CARDS ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .card-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 12px 16px 0;
    }

    /* task row */
    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .task-row:last-child { border-bottom: none; }

    .task-row-label {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .task-row-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .task-row-value {
      font-weight: 700;
      color: var(--gold);
      font-size: 0.95rem;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .kid-toggles {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .kid-toggle {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      padding: 0;
    }

    .kid-toggle.done-kid-1 { background: #eff6ff; border-color: var(--kid1); color: var(--kid1); }
    .kid-toggle.done-kid-2 { background: #fdf2f8; border-color: var(--kid2); color: var(--kid2); }

    .delete-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
    }
    .delete-btn:hover { background: var(--red-bg); color: var(--red); }

    /* add task form */
    .add-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px 16px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .add-form-row { display: flex; gap: 8px; }

    .add-form input[type="number"] { max-width: 90px; }

    .add-form .btn-primary { width: auto; padding: 12px 20px; font-size: 0.9rem; }

    /* ── EARNINGS VIEW ──────────────────────────────────────── */
    .earnings-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 12px;
    }

    .earnings-name {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .earnings-total {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }

    .cashout-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .cashout-note { font-size: 0.82rem; color: var(--muted); }

    /* ── TYPE FILTER ────────────────────────────────────────── */
    .type-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .type-filter::-webkit-scrollbar { display: none; }

    .type-filter-btn {
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      border-radius: 20px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .type-filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ── TYPE BADGES ────────────────────────────────────────── */
    .type-badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .type-badge.type-weekly    { background: #eff6ff; color: var(--primary);  border: 1px solid #bfdbfe; }
    .type-badge.type-biweekly  { background: #f5f3ff; color: #7c3aed;         border: 1px solid #ddd6fe; }
    .type-badge.type-permanent { background: var(--gold-bg); color: var(--gold); border: 1px solid #fde68a; }

    .kid-toggle[disabled] { cursor: not-allowed; opacity: 0.4; }

    /* ── SETTINGS ───────────────────────────────────────────── */
    .settings-section { margin-bottom: 20px; }

    .settings-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .kid-settings-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .color-swatches {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .color-swatch:active { transform: scale(0.9); }
    .color-swatch.selected { border-color: var(--text); }

    .code-display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: monospace;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-align: center;
      color: var(--text);
    }

    .warning-note {
      font-size: 0.82rem;
      color: var(--red);
      text-align: center;
    }

    /* ── WIFI WIZARD ────────────────────────────────────────── */
    .wifi-network {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .wifi-network:last-child { border-bottom: none; }
    .wifi-network:active { background: var(--bg); }

    .wifi-signal {
      font-size: 0.75rem;
      letter-spacing: -1px;
      flex-shrink: 0;
      color: var(--primary);
    }

    .wifi-name { flex: 1; font-size: 0.95rem; font-weight: 500; }
    .wifi-lock { font-size: 0.8rem; color: var(--muted); }

    /* loading / empty states */
    .loading { color: var(--muted); text-align: center; padding: 32px; font-size: 0.95rem; }
    .empty   { color: var(--muted); text-align: center; padding: 20px 16px; font-size: 0.9rem; }

    /* push button */
    #push-btn {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--primary);
      color: #fff;
      border-radius: 50px;
      padding: 12px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(59,130,246,.35);
      z-index: 50;
      white-space: nowrap;
    }
    #push-btn.sent { background: var(--green); box-shadow: 0 4px 16px rgba(34,197,94,.35); }

    /* toast */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a202c;
      color: #fff;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.88rem;
      font-weight: 600;
      z-index: 100;
      transition: transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────── -->
<div id="login-view">
  <div class="login-card">
    <div class="login-logo">💰 GigDashboard</div>

    <!-- Login form -->
    <div id="login-form">
      <div class="login-sub">Parent Control Panel</div>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" type="text" placeholder="dad or mom" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="btn-primary" id="login-btn" style="margin-top:8px">Sign In</button>
      <button id="show-recover-btn"
              style="width:100%;margin-top:12px;background:none;color:var(--muted);font-size:0.85rem;padding:8px">
        Forgot password?
      </button>
    </div>

    <!-- Recovery form -->
    <div id="recover-form" class="hidden">
      <div class="login-sub">Reset Password</div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input id="rec-username" type="text" placeholder="dad or mom" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Recovery Code</label>
        <input id="rec-code" type="text" placeholder="XXXX-XXXX" autocomplete="off"
               style="font-family:monospace;letter-spacing:0.1em;text-transform:uppercase">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input id="rec-new-pw" type="password" placeholder="New password (min 6 chars)">
      </div>
      <div class="error-msg" id="recover-error"></div>
      <button class="btn-primary" id="recover-btn" style="margin-top:8px">Reset Password</button>
      <button id="show-login-btn"
              style="width:100%;margin-top:12px;background:none;color:var(--muted);font-size:0.85rem;padding:8px">
        Back to sign in
      </button>
    </div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────── -->
<div id="app-view">
  <div id="app-header">
    <div class="logo">💰 GigDashboard</div>
    <span class="user" id="user-label"></span>
    <button id="logout-btn">Log out</button>
  </div>

  <div id="tab-bar">
    <button class="tab-btn active" data-tab="daily">Daily Tasks</button>
    <button class="tab-btn"        data-tab="tracking">Tracking</button>
    <button class="tab-btn"        data-tab="gigs">Gig Tasks</button>
    <button class="tab-btn"        data-tab="earnings">Earnings</button>
    <button class="tab-btn"        data-tab="settings">Settings</button>
  </div>

  <div id="tab-content">
    <!-- filled by JS -->
  </div>
</div>

<button id="push-btn" class="hidden">📺 Push to TV</button>
<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────
let token    = localStorage.getItem('gd_token')    || '';
let username = localStorage.getItem('gd_username') || '';
let kids     = [];
let activeTab = 'daily';

// ── Helpers ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => '$' + parseFloat(n).toFixed(2);

function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: 'Bearer ' + token } : {})
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401) { doLogout(); return null; }
  return res.json();
}

// ── Auth ─────────────────────────────────────────────────────
function showLogin() {
  $('login-view').style.display = 'flex';
  $('app-view').style.display   = 'none';
}

function doLogout() {
  token = username = '';
  localStorage.removeItem('gd_token');
  localStorage.removeItem('gd_username');
  showLogin();
}

$('login-btn').addEventListener('click', async () => {
  const u = $('username').value.trim();
  const p = $('password').value;
  if (!u || !p) { $('login-error').textContent = 'Please enter username and password'; return; }
  $('login-error').textContent = '';
  $('login-btn').textContent   = 'Signing in…';
  const data = await api('POST', '/auth/login', { username: u, password: p })
    .catch(() => null);
  $('login-btn').textContent = 'Sign In';
  if (!data || data.error) {
    $('login-error').textContent = data?.error || 'Login failed';
    return;
  }
  token = data.token; username = data.username;
  localStorage.setItem('gd_token',    token);
  localStorage.setItem('gd_username', username);
  showApp();
});

$('password').addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); });

// Toggle between login and recovery forms
$('show-recover-btn').addEventListener('click', () => {
  $('login-form').classList.add('hidden');
  $('recover-form').classList.remove('hidden');
});
$('show-login-btn').addEventListener('click', () => {
  $('recover-form').classList.add('hidden');
  $('login-form').classList.remove('hidden');
});

// Recovery form submit
$('recover-btn').addEventListener('click', async () => {
  const u    = $('rec-username').value.trim();
  const code = $('rec-code').value.trim();
  const pw   = $('rec-new-pw').value;
  $('recover-error').textContent = '';
  if (!u || !code || !pw) { $('recover-error').textContent = 'All fields required'; return; }
  $('recover-btn').textContent = 'Resetting…';
  const data = await api('POST', '/auth/recover', { username: u, recovery_code: code, new_password: pw })
    .catch(() => null);
  $('recover-btn').textContent = 'Reset Password';
  if (!data || data.error) {
    $('recover-error').textContent = data?.error || 'Reset failed';
    return;
  }
  token = data.token; username = data.username;
  localStorage.setItem('gd_token',    token);
  localStorage.setItem('gd_username', username);
  showApp();
});

$('logout-btn').addEventListener('click', doLogout);

// ── Kids ─────────────────────────────────────────────────────
async function loadKids() {
  const data = await api('GET', '/parent/kids');
  if (data) kids = data;
}

function kidName(id) {
  const k = kids.find(k => k.id == id);
  return k ? k.name : 'All';
}

function kidClass(id) {
  const idx = kids.findIndex(k => k.id == id);
  return idx >= 0 ? `kid-${idx + 1}` : 'kid-1';
}

// ── Tabs ─────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    renderTab(activeTab);
  });
});

function renderTab(tab) {
  const el = $('tab-content');
  el.innerHTML = '<div class="loading">Loading…</div>';
  if (tab === 'daily')    renderDaily(el);
  if (tab === 'tracking') renderTracking(el);
  if (tab === 'gigs')     renderGigs(el);
  if (tab === 'earnings') renderEarnings(el);
  if (tab === 'settings') renderSettings(el);
}

// ── DAILY TASKS ──────────────────────────────────────────────
async function renderDaily(el) {
  const tasks = await api('GET', '/parent/daily-tasks');
  if (!tasks) return;

  function completedBy(task) {
    if (!task.completed_by) return [];
    return task.completed_by.split(',').map(Number);
  }

  const rows = tasks.length === 0
    ? '<div class="empty">No daily tasks yet — add one below.</div>'
    : tasks.map(task => {
        const cb  = completedBy(task);
        const who = task.kid_id
          ? `<div class="task-row-meta">Only for ${kidName(task.kid_id)}</div>`
          : task.is_joint
            ? `<div class="task-row-meta">🤝 Joint — one completion marks all done</div>`
            : '';
        const toggles = kids.map(k => {
          const done = cb.includes(k.id);
          const cls  = done ? `done-${kidClass(k.id)}` : '';
          return `<button class="kid-toggle ${cls}"
                    data-task="${task.id}" data-kid="${k.id}" data-done="${done ? '1' : '0'}"
                    title="${k.name}">
                    ${k.name.charAt(0)}
                  </button>`;
        }).join('');
        const trusted = task.is_trusted;
        const joint   = task.is_joint;
        return `
          <div class="task-row" id="daily-row-${task.id}">
            <div style="flex:1">
              <div class="task-row-label">${task.title}</div>
              ${who}
            </div>
            <div class="kid-toggles">${toggles}</div>
            <button class="kid-toggle ${joint ? 'done-kid-1' : ''}"
                    data-joint-daily="${task.id}" data-joint="${joint ? '1' : '0'}"
                    title="${joint ? 'Joint task — tap to make individual' : 'Make joint (one completion marks all done)'}"
                    style="font-size:1rem">🤝</button>
            <button class="kid-toggle ${trusted ? 'done-kid-1' : ''}"
                    data-trust-daily="${task.id}" data-trusted="${trusted ? '1' : '0'}"
                    title="${trusted ? 'Kids can self-complete (tap to revoke)' : 'Make self-service on tablet'}"
                    style="font-size:1rem">✋</button>
            <button class="delete-btn" data-del-daily="${task.id}" title="Remove task">×</button>
          </div>`;
      }).join('');

  const kidOptions = `
    <option value="">Both kids</option>
    ${kids.map(k => `<option value="${k.id}">${k.name} only</option>`).join('')}
  `;

  el.innerHTML = `
    <div class="card">
      <div class="card-section-title">Today — tap a name to toggle ✓</div>
      ${rows}
      <div class="add-form">
        <div class="add-form-row">
          <input type="text" id="daily-title" placeholder="New daily task…">
          <select id="daily-kid">${kidOptions}</select>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:0.88rem;color:var(--muted);cursor:pointer">
          <input type="checkbox" id="daily-joint" style="width:16px;height:16px;cursor:pointer">
          🤝 Joint task — one completion marks all kids done
        </label>
        <button class="btn-primary" id="daily-add-btn">+ Add Task</button>
      </div>
    </div>
  `;

  // Toggle daily completion
  el.querySelectorAll('.kid-toggle').forEach(btn => {
    btn.addEventListener('click', async () => {
      const taskId  = btn.dataset.task;
      const kidId   = btn.dataset.kid;
      const wasDone = btn.dataset.done === '1';
      const res = await api('POST', `/parent/daily-tasks/${taskId}/complete`,
        { kid_id: +kidId, completed: !wasDone });
      if (!res || res.error) { toast('⚠️ Failed to save — try again'); return; }
      toast(!wasDone ? '✓ Marked complete' : 'Marked incomplete');
      renderTab('daily');
    });
  });

  // Joint toggle
  el.querySelectorAll('[data-joint-daily]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const taskId   = btn.dataset.jointDaily;
      const wasJoint = btn.dataset.joint === '1';
      await api('PATCH', `/parent/daily-tasks/${taskId}`, { is_joint: !wasJoint });
      toast(!wasJoint ? '🤝 Joint task — one completion marks all kids done' : 'Task is now individual');
      renderTab('daily');
    });
  });

  // Trusted toggle
  el.querySelectorAll('[data-trust-daily]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const taskId    = btn.dataset.trustDaily;
      const wasTrusted = btn.dataset.trusted === '1';
      await api('PATCH', `/parent/daily-tasks/${taskId}`, { is_trusted: !wasTrusted });
      toast(!wasTrusted ? '✋ Task is now self-service on tablet' : 'Task removed from tablet');
      renderTab('daily');
    });
  });

  // Delete daily task
  el.querySelectorAll('[data-del-daily]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Remove this daily task?')) return;
      await api('DELETE', `/parent/daily-tasks/${btn.dataset.delDaily}`);
      toast('Task removed');
      renderTab('daily');
    });
  });

  // Add daily task
  $('daily-add-btn').addEventListener('click', async () => {
    const title    = $('daily-title').value.trim();
    const kid_id   = $('daily-kid').value || null;
    const is_joint = $('daily-joint').checked;
    if (!title) return;
    await api('POST', '/parent/daily-tasks', { title, kid_id: kid_id ? +kid_id : null, is_joint });
    toast('Daily task added');
    renderTab('daily');
  });
}

// ── GIG TASKS ────────────────────────────────────────────────
async function renderGigs(el) {
  const tasks = await api('GET', '/parent/gig-tasks');
  if (!tasks) return;

  let activeType = 'all';
  const TYPE_LABELS = { weekly: 'Weekly', biweekly: 'Bi-weekly', permanent: 'Permanent' };

  function completedBy(task) {
    if (!task.completed_by) return [];
    return task.completed_by.toString().split(',').map(Number);
  }

  function buildRows() {
    const filtered = activeType === 'all' ? tasks : tasks.filter(t => t.type === activeType);
    if (filtered.length === 0) return '<div class="empty">No tasks of this type yet.</div>';

    return filtered.map(task => {
      const cb            = completedBy(task);
      const takenBy       = task.taken_by_kid_id;
      const parentClaimed = !!task.parent_claimed;
      const who           = task.kid_id ? `<div class="task-row-meta">Only for ${kidName(task.kid_id)}</div>` : '';

      const toggles = kids.map(k => {
        const done         = cb.includes(k.id);
        const takenByOther = takenBy && takenBy != k.id && !done;
        const blocked      = parentClaimed || takenByOther;
        const cls          = done ? `done-${kidClass(k.id)}` : '';
        const takerName    = kids.find(x => x.id == takenBy)?.name;
        const titleAttr    = parentClaimed ? 'Parent handled' : takenByOther ? `Claimed by ${takerName}` : k.name;
        return `<button class="kid-toggle ${cls}" ${blocked ? 'disabled' : ''}
                  data-task="${task.id}" data-kid="${k.id}" data-done="${done ? '1' : '0'}"
                  title="${titleAttr}">
                  ${blocked ? '🔒' : k.name.charAt(0)}
                </button>`;
      }).join('');

      const canEdit = !takenBy && !parentClaimed;
      return `
        <div class="task-row" id="gig-row-${task.id}">
          <div style="flex:1">
            <div class="task-row-label">
              ${task.title}
              <span class="type-badge type-${task.type}">${TYPE_LABELS[task.type] || task.type}</span>
            </div>
            ${who}
          </div>
          <span class="task-row-value">${fmt(task.value)}</span>
          <div class="kid-toggles">${toggles}</div>
          <button class="kid-toggle ${parentClaimed ? 'done-kid-1' : ''}"
                  data-parent-claim="${task.id}" data-claimed="${parentClaimed ? '1' : '0'}"
                  title="${parentClaimed ? 'Parent handled — tap to release' : 'Mark as parent handled'}"
                  style="font-size:1rem">👨</button>
          ${canEdit ? `<button class="delete-btn" data-edit-gig="${task.id}"
                  data-title="${task.title.replace(/"/g,'&quot;')}" data-value="${task.value}"
                  title="Edit task">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="2.5"
                       stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                  </svg>
                </button>` : ''}
          <button class="delete-btn" data-del-gig="${task.id}" title="Archive task">×</button>
        </div>`;
    }).join('');
  }

  const kidOptions = `
    <option value="">Both kids</option>
    ${kids.map(k => `<option value="${k.id}">${k.name} only</option>`).join('')}
  `;

  el.innerHTML = `
    <div class="type-filter">
      <button class="type-filter-btn active" data-type="all">All</button>
      <button class="type-filter-btn" data-type="weekly">Weekly</button>
      <button class="type-filter-btn" data-type="biweekly">Bi-weekly</button>
      <button class="type-filter-btn" data-type="permanent">Permanent</button>
    </div>
    <div class="card">
      <div class="card-section-title">Tap a name to mark earned — first come, first serve</div>
      <div id="gig-rows">${buildRows()}</div>
      <div class="add-form">
        <input type="text" id="gig-title" placeholder="New gig task…">
        <div class="add-form-row">
          <input type="number" id="gig-value" placeholder="$0.00" min="0.01" step="0.25">
          <select id="gig-type">
            <option value="weekly">Weekly (7 days)</option>
            <option value="biweekly">Bi-weekly (14 days)</option>
            <option value="permanent">Permanent</option>
          </select>
          <select id="gig-kid">${kidOptions}</select>
        </div>
        <button class="btn-primary" id="gig-add-btn">+ Add Gig Task</button>
      </div>
    </div>
  `;

  // Type filter
  el.querySelectorAll('.type-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('.type-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeType = btn.dataset.type;
      $('gig-rows').innerHTML = buildRows();
      attachToggles();
      attachDeletes();
      attachParentClaims();
      attachEdits();
    });
  });

  function attachToggles() {
    el.querySelectorAll('#gig-rows .kid-toggle:not([disabled])').forEach(btn => {
      btn.addEventListener('click', async () => {
        const taskId  = btn.dataset.task;
        const kidId   = btn.dataset.kid;
        const wasDone = btn.dataset.done === '1';
        const earner  = kids.find(k => k.id == kidId)?.name;
        const task    = tasks.find(t => t.id == taskId);
        const res = await api('POST', `/parent/gig-tasks/${taskId}/complete`,
          { kid_id: +kidId, completed: !wasDone });
        if (res?.error) { toast(`⚠️ ${res.error}`); return; }
        toast(!wasDone ? `${earner} earned ${fmt(task?.value || 0)} 🎉` : 'Earning removed');
        renderTab('gigs');
      });
    });
  }

  function attachDeletes() {
    el.querySelectorAll('[data-del-gig]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Archive this gig task?')) return;
        await api('DELETE', `/parent/gig-tasks/${btn.dataset.delGig}`);
        toast('Task archived');
        renderTab('gigs');
      });
    });
  }

  function attachParentClaims() {
    el.querySelectorAll('[data-parent-claim]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const taskId     = btn.dataset.parentClaim;
        const wasClaimed = btn.dataset.claimed === '1';
        const res = await api('POST', `/parent/gig-tasks/${taskId}/parent-claim`, { claimed: !wasClaimed });
        if (res?.error) { toast(`⚠️ ${res.error}`); return; }
        toast(!wasClaimed ? '👨 Marked as parent handled' : 'Released for kids');
        api('POST', '/push');
        renderTab('gigs');
      });
    });
  }

  function attachEdits() {
    el.querySelectorAll('[data-edit-gig]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id    = btn.dataset.editGig;
        const title = btn.dataset.title;
        const value = btn.dataset.value;
        const row   = document.getElementById(`gig-row-${id}`);
        row.innerHTML = `
          <div style="flex:1;display:flex;gap:8px;align-items:center">
            <input type="text"   id="eg-title-${id}" value="${title}" style="flex:1">
            <input type="number" id="eg-value-${id}" value="${value}" min="0.01" step="0.25" style="max-width:80px">
          </div>
          <button class="btn-sm btn-green" id="eg-save-${id}">Save</button>
          <button class="btn-sm btn-gray"  id="eg-cancel-${id}">Cancel</button>
        `;
        document.getElementById(`eg-cancel-${id}`).addEventListener('click', () => renderTab('gigs'));
        document.getElementById(`eg-save-${id}`).addEventListener('click', async () => {
          const t = document.getElementById(`eg-title-${id}`).value.trim();
          const v = parseFloat(document.getElementById(`eg-value-${id}`).value);
          if (!t || isNaN(v) || v <= 0) { toast('Enter a valid title and value'); return; }
          const res = await api('PATCH', `/parent/gig-tasks/${id}`, { title: t, value: v });
          if (res?.error) { toast(`⚠️ ${res.error}`); return; }
          toast('Task updated');
          renderTab('gigs');
        });
      });
    });
  }

  attachToggles();
  attachDeletes();
  attachParentClaims();
  attachEdits();

  $('gig-add-btn').addEventListener('click', async () => {
    const title  = $('gig-title').value.trim();
    const value  = parseFloat($('gig-value').value);
    const type   = $('gig-type').value;
    const kid_id = $('gig-kid').value || null;
    if (!title || isNaN(value) || value <= 0) { toast('Enter a title and a dollar value'); return; }
    await api('POST', '/parent/gig-tasks', { title, value, type, kid_id: kid_id ? +kid_id : null });
    toast('Gig task added');
    renderTab('gigs');
  });
}

// ── TRACKING TASKS ───────────────────────────────────────────
async function renderTracking(el) {
  const tasks = await api('GET', '/parent/tracking-tasks');
  if (!tasks) return;

  function whoLabel(done, kidId) {
    if (!done) return '—';
    if (kidId === null || kidId === undefined) return 'Parent';
    return kids.find(k => k.id == kidId)?.name || 'Someone';
  }

  function stepToggles(task, step, done, kidId) {
    const btns = [
      { label: 'P', id: 0, isParent: true },
      ...kids.map(k => ({ label: k.name.charAt(0), id: k.id, isParent: false }))
    ];
    return btns.map(btn => {
      const isActive = done && (
        (btn.isParent && (kidId === null || kidId === undefined)) ||
        (!btn.isParent && kidId == btn.id)
      );
      const cls = isActive ? `kid-toggle done-${btn.isParent ? 'parent' : kidClass(btn.id)}` : 'kid-toggle';
      const activeStyle = isActive ? 'background:#f0fdf4;border-color:#22c55e;color:#22c55e;' : '';
      return `<button class="kid-toggle" style="${activeStyle}"
                data-tr-task="${task.id}" data-tr-step="${step}"
                data-tr-kid="${btn.isParent ? '' : btn.id}"
                data-tr-done="${isActive ? '1' : '0'}"
                title="${btn.isParent ? 'Parent' : kids.find(k=>k.id==btn.id)?.name}">
                ${btn.label}
              </button>`;
    }).join('');
  }

  const rows = tasks.length === 0
    ? '<div class="empty">No tracking tasks yet — add one below.</div>'
    : tasks.map(task => `
        <div class="task-row">
          <div style="flex:1">
            <div class="task-row-label">${task.title}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:0.78rem;color:var(--muted);min-width:60px">${task.step1_label}</span>
              <div class="kid-toggles">${stepToggles(task, 1, task.step1_done, task.step1_kid_id)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:0.78rem;color:var(--muted);min-width:60px">${task.step2_label}</span>
              <div class="kid-toggles">${stepToggles(task, 2, task.step2_done, task.step2_kid_id)}</div>
            </div>
          </div>
          <button class="delete-btn" data-del-tracking="${task.id}" title="Remove">×</button>
        </div>`
    ).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-section-title">Today — tap who completed each step (Us = parent)</div>
      ${rows}
      <div class="add-form">
        <input type="text" id="tr-title" placeholder="Tracking task name… (e.g. Feed the dogs)">
        <div class="add-form-row">
          <input type="text" id="tr-step1" placeholder="Step 1 label (Morning)">
          <input type="text" id="tr-step2" placeholder="Step 2 label (Evening)">
        </div>
        <button class="btn-primary" id="tr-add-btn">+ Add Tracking Task</button>
      </div>
    </div>
  `;

  // Step toggles
  el.querySelectorAll('[data-tr-task]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const taskId  = btn.dataset.trTask;
      const step    = btn.dataset.trStep;
      const kidId   = btn.dataset.trKid === '' ? null : +btn.dataset.trKid;
      const wasDone = btn.dataset.trDone === '1';
      await api('POST', `/parent/tracking-tasks/${taskId}/step/${step}/complete`,
        { kid_id: kidId, completed: !wasDone });
      renderTab('tracking');
    });
  });

  // Delete
  el.querySelectorAll('[data-del-tracking]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Remove this tracking task?')) return;
      await api('DELETE', `/parent/tracking-tasks/${btn.dataset.delTracking}`);
      toast('Tracking task removed');
      renderTab('tracking');
    });
  });

  // Add
  $('tr-add-btn').addEventListener('click', async () => {
    const title      = $('tr-title').value.trim();
    const step1_label = $('tr-step1').value.trim() || 'Morning';
    const step2_label = $('tr-step2').value.trim() || 'Evening';
    if (!title) { toast('Enter a task name'); return; }
    await api('POST', '/parent/tracking-tasks', { title, step1_label, step2_label });
    toast('Tracking task added');
    renderTab('tracking');
  });
}

// ── EARNINGS ─────────────────────────────────────────────────
async function renderEarnings(el) {
  const data = await api('GET', '/parent/earnings');
  if (!data) return;

  const cards = data.summary.map(k => {
    const color = `var(--${kidClass(k.id)})`;
    return `
      <div class="earnings-card">
        <div class="earnings-name" style="color:${color}">${k.name}</div>
        <div class="earnings-total">${fmt(k.total)}</div>
        <div class="cashout-row">
          <span class="cashout-note">${k.completions} tasks completed</span>
          <button class="btn-sm btn-gold" data-cashout="${k.id}" data-name="${k.name}">
            Cash Out 💸
          </button>
        </div>
      </div>
    `;
  }).join('');

  el.innerHTML = cards || '<div class="loading">No data yet.</div>';

  el.querySelectorAll('[data-cashout]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const name = btn.dataset.name;
      if (!confirm(`Cash out all of ${name}'s earnings? This resets their piggy bank to $0.00.`)) return;
      const res = await api('POST', `/parent/kids/${btn.dataset.cashout}/cashout`);
      if (res?.ok) {
        toast(`💸 ${name} cashed out ${fmt(res.cashedOut)}!`);
        renderTab('earnings');
      }
    });
  });
}

      <div class="card" style="padding:16px;display:flex;flex-direction:column;gap:10px">
        <p style="font-size:0.88rem;color:var(--muted)">
          A recovery code lets you reset your password if you get locked out.
          Generate one and store it somewhere safe — it's only shown once.
        </p>
        <button class="btn-primary" id="gen-code-btn">Generate Recovery Code</button>
        <div id="code-result" class="hidden">
          <div class="code-display" id="code-display"></div>
          <div class="warning-note" style="margin-top:8px">
            ⚠️ Copy this now — it will not be shown again
          </div>
          <button class="btn-sm btn-gray" id="copy-code-btn" style="width:100%;margin-top:8px">
            Copy to Clipboard
          </button>
        </div>
      </div>
    </div>
  `;

  // Color swatch clicks
  el.querySelectorAll('[data-kid-color]').forEach(swatch => {
    swatch.addEventListener('click', async () => {
      const kidId = swatch.dataset.kidColor;
      const color = swatch.dataset.color;
      el.querySelectorAll(`[data-kid-color="${kidId}"]`).forEach(s => s.classList.remove('selected'));
      swatch.classList.add('selected');
      document.querySelector(`#kid-card-${kidId} [style*="border-radius:50%"]`).style.background = color;
      await api('PATCH', `/parent/kids/${kidId}`, { color });
      await loadKids();
      toast('Color updated');
    });
  });

  // Save kid name
  el.querySelectorAll('[data-save-kid]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const kidId = btn.dataset.saveKid;
      const name  = $(`kid-name-${kidId}`).value.trim();
      if (!name) return;
      await api('PATCH', `/parent/kids/${kidId}`, { name });
      await loadKids();
      toast('Name updated');
    });
  });

  // Remove kid
  el.querySelectorAll('[data-del-kid]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const name = kidsData.find(k => k.id == btn.dataset.delKid)?.name;
      if (!confirm(`Remove ${name}? This deletes all their task history.`)) return;
      const res = await api('DELETE', `/parent/kids/${btn.dataset.delKid}`);
      if (res?.error) { toast(`⚠️ ${res.error}`); return; }
      await loadKids();
      toast(`${name} removed`);
      renderTab('settings');
    });
  });

  // Add kid
  $('add-kid-btn').addEventListener('click', async () => {
    const name = $('new-kid-name').value.trim();
    if (!name) return;
    await api('POST', '/parent/kids', { name, color: KID_COLORS[kidsData.length % KID_COLORS.length] });
    await loadKids();
    toast(`${name} added`);
    renderTab('settings');
  });

  // Change password
  $('change-pw-btn').addEventListener('click', async () => {
    const cur  = $('cur-pw').value;
    const nw   = $('new-pw').value;
    const conf = $('conf-pw').value;
    if (!cur || !nw) { toast('Fill in all password fields'); return; }
    if (nw !== conf)  { toast('New passwords do not match'); return; }
    const res = await api('POST', '/parent/change-password', { current_password: cur, new_password: nw });
    if (res?.error) { toast(`⚠️ ${res.error}`); return; }
    $('cur-pw').value = $('new-pw').value = $('conf-pw').value = '';
    toast('✓ Password updated');
  });

  // Generate recovery code
  $('gen-code-btn').addEventListener('click', async () => {
    if (!confirm('Generate a new recovery code? Any existing code will be replaced.')) return;
    const res = await api('POST', '/parent/recovery-code/generate');
    if (!res?.code) { toast('Failed to generate code'); return; }
    $('code-display').textContent = res.code;
    $('code-result').classList.remove('hidden');
    $('gen-code-btn').textContent = 'Regenerate Code';
  });

  // Copy code
  $('copy-code-btn').addEventListener('click', () => {
    navigator.clipboard.writeText($('code-display').textContent);
    toast('Copied to clipboard');
  });

  // ── Updates ────────────────────────────────────────────────
  async function checkForUpdates() {
    $('update-status').textContent = 'Checking…';
    $('update-status').style.color = 'var(--muted)';
    const res = await api('GET', '/admin/update/check');
    if (!res) return;
    if (res.unsupported) {
      $('update-status').textContent = 'Use deploygigdash to update this device';
      return;
    }
    if (res.upToDate) {
      $('update-status').textContent = `✓ Up to date  (${res.current})`;
      $('update-status').style.color = 'var(--green)';
      $('update-changes').classList.add('hidden');
      $('apply-update-btn').classList.add('hidden');
    } else {
      const lines = res.changes.split('\n').map(l => `• ${l.replace(/^[a-f0-9]+ /, '')}`).join('<br>');
      $('update-status').textContent = `Update available  (${res.current})`;
      $('update-status').style.color = 'var(--gold)';
      $('update-changes').innerHTML = lines;
      $('update-changes').classList.remove('hidden');
      $('apply-update-btn').classList.remove('hidden');
    }
  }

  $('check-update-btn').addEventListener('click', checkForUpdates);

  $('apply-update-btn').addEventListener('click', async () => {
    if (!confirm('Apply update and restart the app? The TV dashboard will reload in a few seconds.')) return;
    $('apply-update-btn').textContent = 'Updating…';
    $('apply-update-btn').disabled = true;
    $('update-error').classList.add('hidden');

    function startCountdown() {
      $('apply-update-btn').classList.add('hidden');
      $('update-changes').classList.add('hidden');
      let secs = 10;
      const tick = () => {
        $('update-status').textContent = `✓ Updated — reloading in ${secs}s…`;
        $('update-status').style.color = 'var(--green)';
        if (secs-- > 0) setTimeout(tick, 1000);
        else location.reload();
      };
      tick();
    }

    try {
      const res = await api('POST', '/admin/update/apply');
      if (res?.upToDate) { toast('Already up to date'); $('apply-update-btn').disabled = false; $('apply-update-btn').textContent = 'Apply Update & Restart'; return; }
      if (!res || res.error) {
        $('update-error').textContent = [res?.error, res?.detail].filter(Boolean).join('\n\n') || 'Request failed — check server logs';
        $('update-error').classList.remove('hidden');
        $('apply-update-btn').textContent = 'Apply Update & Restart';
        $('apply-update-btn').disabled = false;
        return;
      }
      startCountdown();
    } catch {
      // Network drop = service restarted mid-response = expected
      startCountdown();
    }
  });

  // Auto-check on open
  checkForUpdates();

  // ── WiFi wizard ────────────────────────────────────────────
  function signalBars(s) {
    if (s >= 75) return '████';
    if (s >= 50) return '███░';
    if (s >= 25) return '██░░';
    return '█░░░';
  }

  async function loadWifiStatus() {
    const res = await api('GET', '/admin/wifi/status');
    if (!res || res.unsupported) {
      $('wifi-status-label').textContent = 'Not available on this device';
      $('wifi-scan-btn').classList.add('hidden');
      $('wifi-manual-btn').classList.add('hidden');
      return;
    }
    const wifi = res.connections.find(c => c.type === 'wifi' || c.type === '802-11-wireless');
    const eth  = res.connections.find(c => c.type === 'ethernet' || c.type === '802-3-ethernet');
    if (wifi) {
      $('wifi-status-label').textContent = `Connected: ${wifi.name}`;
      $('wifi-status-label').style.color = 'var(--green)';
    } else if (eth) {
      $('wifi-status-label').textContent = 'Ethernet only — no WiFi configured';
    } else {
      $('wifi-status-label').textContent = 'Not connected';
    }
  }

  function showConnectForm(ssid = '') {
    $('wifi-network-list').classList.add('hidden');
    $('wifi-connect-form').classList.remove('hidden');
    $('wifi-ssid').value = ssid;
    $('wifi-ssid').readOnly = !!ssid;
    $('wifi-password').value = '';
    $('wifi-error').classList.add('hidden');
    $('wifi-password').focus();
  }

  $('wifi-scan-btn').addEventListener('click', async () => {
    $('wifi-scan-btn').textContent = 'Scanning…';
    $('wifi-scan-btn').disabled = true;
    $('wifi-connect-form').classList.add('hidden');
    const res = await api('GET', '/admin/wifi/scan');
    $('wifi-scan-btn').textContent = 'Scan';
    $('wifi-scan-btn').disabled = false;
    if (!res || res.unsupported || res.error) {
      toast('⚠️ Scan failed'); return;
    }
    if (res.networks.length === 0) {
      $('wifi-network-list').innerHTML = '<div class="empty">No networks found</div>';
    } else {
      $('wifi-network-list').innerHTML = res.networks.map(n => `
        <div class="wifi-network" data-ssid="${n.ssid.replace(/"/g, '&quot;')}">
          <span class="wifi-signal">${signalBars(n.signal)}</span>
          <span class="wifi-name">${n.ssid}</span>
          <span class="wifi-lock">${n.security && n.security !== '--' ? '🔒' : ''}</span>
        </div>
      `).join('');
      el.querySelectorAll('.wifi-network').forEach(row => {
        row.addEventListener('click', () => showConnectForm(row.dataset.ssid));
      });
    }
    $('wifi-network-list').classList.remove('hidden');
  });

  $('wifi-manual-btn').addEventListener('click', () => showConnectForm());
  $('wifi-cancel-btn').addEventListener('click', () => {
    $('wifi-connect-form').classList.add('hidden');
    $('wifi-network-list').classList.add('hidden');
  });

  $('wifi-connect-btn').addEventListener('click', async () => {
    const ssid     = $('wifi-ssid').value.trim();
    const password = $('wifi-password').value;
    if (!ssid) { toast('Enter a network name'); return; }
    $('wifi-connect-btn').textContent = 'Connecting…';
    $('wifi-connect-btn').disabled = true;
    $('wifi-error').classList.add('hidden');
    const res = await api('POST', '/admin/wifi/connect', { ssid, password });
    $('wifi-connect-btn').textContent = 'Connect';
    $('wifi-connect-btn').disabled = false;
    if (!res || res.error) {
      $('wifi-error').textContent = [res?.error, res?.detail].filter(Boolean).join('\n') || 'Connection failed';
      $('wifi-error').classList.remove('hidden');
      return;
    }
    $('wifi-connect-form').classList.add('hidden');
    $('wifi-network-list').classList.add('hidden');
    toast(`✓ Connected to ${ssid}`);
    loadWifiStatus();
  });

  loadWifiStatus();

  // ── Display schedule ───────────────────────────────────────
  const schedRes = await api('GET', '/admin/display-schedule');
  if (!schedRes?.unsupported) {
    el.insertAdjacentHTML('beforeend', `
      <div class="settings-section">
        <div class="settings-section-title">Display Sleep Schedule</div>
        <div class="card" style="padding:16px;display:flex;flex-direction:column;gap:12px">
          <label style="display:flex;align-items:center;gap:10px;font-size:0.95rem;font-weight:500;cursor:pointer">
            <input type="checkbox" id="schedule-enabled" ${schedRes?.enabled ? 'checked' : ''}
                   style="width:18px;height:18px;cursor:pointer">
            Enable sleep schedule
          </label>
          <div style="display:flex;gap:16px">
            <div style="flex:1">
              <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px">Sleep at</div>
              <input type="time" id="schedule-sleep" value="${schedRes?.sleepTime || '22:00'}">
            </div>
            <div style="flex:1">
              <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px">Wake at</div>
              <input type="time" id="schedule-wake" value="${schedRes?.wakeTime || '06:00'}">
            </div>
          </div>
          <button class="btn-primary" id="schedule-save-btn">Save Schedule</button>
        </div>
      </div>
    `);

    $('schedule-save-btn').addEventListener('click', async () => {
      const res = await api('POST', '/admin/display-schedule', {
        enabled:   $('schedule-enabled').checked,
        sleepTime: $('schedule-sleep').value,
        wakeTime:  $('schedule-wake').value
      });
      toast(res?.ok ? '✓ Schedule saved' : '⚠️ Failed to save');
    });
  }

  // ── Device controls ────────────────────────────────────────
  el.insertAdjacentHTML('beforeend', `
    <div class="settings-section">
      <div class="settings-section-title">Device Controls</div>
      <div class="card" style="padding:16px;display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;gap:8px">
          <button class="btn-sm btn-gray" id="tv-reload-btn" style="flex:1">📺 Reload TV</button>
          <button class="btn-sm btn-gold" id="reboot-btn"    style="flex:1">🔄 Reboot</button>
          <button class="btn-sm btn-red"  id="shutdown-btn"  style="flex:1">⏻ Shutdown</button>
        </div>
        <p style="font-size:0.78rem;color:var(--muted)">
          Reload TV refreshes the browser. Reboot/Shutdown affect the whole device.
        </p>
      </div>
    </div>
  `);

  $('tv-reload-btn').addEventListener('click', async () => {
    await api('POST', '/admin/tv-reload');
    toast('📺 TV reloading…');
  });

  $('reboot-btn').addEventListener('click', async () => {
    if (!confirm('Reboot the device? Everything will be offline for about a minute.')) return;
    const res = await api('POST', '/admin/reboot');
    toast(res?.error ? `⚠️ ${res.error}` : '🔄 Rebooting…');
  });

  $('shutdown-btn').addEventListener('click', async () => {
    if (!confirm('Shut down the device? You will need physical access to turn it back on.')) return;
    const res = await api('POST', '/admin/shutdown');
    toast(res?.error ? `⚠️ ${res.error}` : '⏻ Shutting down…');
  });
}

// ── Push to TV ───────────────────────────────────────────────
const pushBtn = $('push-btn');
pushBtn.addEventListener('click', async () => {
  pushBtn.textContent = '📺 Pushing…';
  pushBtn.classList.add('sent');
  await api('POST', '/push');
  pushBtn.textContent = '✓ TV Updated';
  setTimeout(() => {
    pushBtn.textContent = '📺 Push to TV';
    pushBtn.classList.remove('sent');
  }, 2500);
});

function showApp() {
  $('login-view').style.display  = 'none';
  $('app-view').style.display    = 'flex';
  $('user-label').textContent    = username;
  pushBtn.classList.remove('hidden');
  loadKids().then(() => renderTab(activeTab));
}

// ── Boot ─────────────────────────────────────────────────────
if (token) { showApp(); } else { showLogin(); }
</script>
</body>
</html>
